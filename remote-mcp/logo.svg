<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)"/>

  <!-- Social media network nodes (representing different platforms) -->
  <g filter="url(#glow)">
    <!-- Central hub (data analysis core) -->
    <circle cx="100" cy="100" r="25" fill="#ffffff" opacity="0.95"/>
    <circle cx="100" cy="100" r="20" fill="url(#iconGradient)"/>

    <!-- Outer platform nodes in a circular pattern -->
    <!-- Node 1 (Twitter/X) - Top -->
    <circle cx="100" cy="40" r="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="100" cy="40" r="9" fill="#1DA1F2"/>

    <!-- Node 2 (Facebook) - Top Right -->
    <circle cx="145" cy="60" r="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="145" cy="60" r="9" fill="#1877F2"/>

    <!-- Node 3 (Instagram) - Right -->
    <circle cx="160" cy="100" r="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="160" cy="100" r="9" fill="#E4405F"/>

    <!-- Node 4 (TikTok) - Bottom Right -->
    <circle cx="145" cy="140" r="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="145" cy="140" r="9" fill="#000000"/>

    <!-- Node 5 (LinkedIn) - Bottom -->
    <circle cx="100" cy="160" r="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="100" cy="160" r="9" fill="#0A66C2"/>

    <!-- Node 6 (YouTube) - Bottom Left -->
    <circle cx="55" cy="140" r="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="55" cy="140" r="9" fill="#FF0000"/>

    <!-- Node 7 (Reddit) - Left -->
    <circle cx="40" cy="100" r="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="40" cy="100" r="9" fill="#FF4500"/>

    <!-- Node 8 (Snapchat) - Top Left -->
    <circle cx="55" cy="60" r="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="55" cy="60" r="9" fill="#FFFC00"/>

    <!-- Connection lines from center to nodes -->
    <line x1="100" y1="100" x2="100" y2="40" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <line x1="100" y1="100" x2="145" y2="60" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <line x1="100" y1="100" x2="160" y2="100" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <line x1="100" y1="100" x2="145" y2="140" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <line x1="100" y1="100" x2="100" y2="160" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <line x1="100" y1="100" x2="55" y2="140" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <line x1="100" y1="100" x2="40" y2="100" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
    <line x1="100" y1="100" x2="55" y2="60" stroke="#ffffff" stroke-width="2" opacity="0.4"/>

    <!-- Bar chart icon in the center (demographics analysis) -->
    <g transform="translate(88, 88)">
      <rect x="0" y="10" width="4" height="14" fill="#ffffff" rx="1"/>
      <rect x="6" y="6" width="4" height="18" fill="#ffffff" rx="1"/>
      <rect x="12" y="2" width="4" height="22" fill="#ffffff" rx="1"/>
      <rect x="18" y="8" width="4" height="16" fill="#ffffff" rx="1"/>
    </g>
  </g>

  <!-- Optional: Add abbreviation text below -->
  <text x="100" y="190" font-family="Arial, sans-serif" font-size="16" font-weight="bold"
        text-anchor="middle" fill="#ffffff" opacity="0.95">SM·DEMO</text>
</svg>
